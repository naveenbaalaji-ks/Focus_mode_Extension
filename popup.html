<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    
    <div id="timer-display" style="display:none;">25:00</div>
    <div class="time-input-wrapper" id="time-input-wrapper">
      <input type="number" id="custom-time" value="25" min="1" max="240">
      <span style="color: var(--text-muted); font-size: 16px; font-weight: bold;">Minutes</span>
    </div>
    
    <div class="pet-zone" id="interactive-zone">
      <div id="mini-pet">🥚</div>
      <div id="mini-level">Level 1</div>
    </div>
    
    <div class="stats-row">
      <div class="stat-box">🔥 <span id="stat-streak">0</span> Streak</div>
      <div class="stat-box">⏱️ <span id="stat-time">0h 0m</span> Total</div>
    </div>
    
    <select id="sound-choice" class="sound-select">
      <option value="none">🔇 No Ambient Sound</option>
      <option value="sounds/rain.mp3">🌧️ Rain Sounds</option>
      <option value="sounds/forest.mp3">🌲 Forest Sounds</option>
      <option value="sounds/cafe.mp3">☕ Cafe Sounds</option>
    </select>
    
    <button id="start-btn" class="btn btn-primary">Start Focus</button>
    <button id="stop-btn" class="btn btn-danger" style="display:none;">Stop Session</button>
    <button id="dash-btn" class="btn btn-outline">📊 Open Full Dashboard</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
